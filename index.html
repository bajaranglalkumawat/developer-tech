<!doctype html>
<html lang="en">
  <head>
    <!-- Charset -->
    <meta charset="UTF-8" />

    <!-- Mobile Responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Google Verification -->
    <meta
      name="google-site-verification"
      content="KiTGxKIyJ56QD0ebt3berTMCrQYxkQkgm-sgVyfOHYE"
    />

    <!-- Google AdSense -->
    <meta name="google-adsense-account" content="ca-pub-2857028809813889" />

    <!-- Primary SEO -->
    <title>
      Developer Tech LLP | Website Development & Digital Marketing Company
    </title>

    <meta
      name="description"
      content="Developer Tech LLP provides professional website development, SEO, digital marketing, business websites, eCommerce solutions, and software development services in India."
    />

    <meta
      name="keywords"
      content="website development company, web design company, SEO services, digital marketing agency, software company, ecommerce website development, React developer, business website development India"
    />

    <meta name="author" content="Developer Tech LLP" />

    <meta name="robots" content="index, follow, max-image-preview:large" />

    <meta name="googlebot" content="index, follow" />

    <meta name="theme-color" content="#0f172a" />

    <!-- Canonical -->
    <link rel="canonical" href="https://developertech.in/" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />

    <!-- Open Graph SEO -->
    <meta property="og:type" content="website" />

    <meta
      property="og:title"
      content="Developer Tech LLP | Website Development Company"
    />

    <meta
      property="og:description"
      content="Grow your business with professional websites, SEO, software solutions, and digital marketing services."
    />

    <meta property="og:url" content="https://developertech.in/" />

    <meta
      property="og:image"
      content="https://developertech.in/og-image.jpg"
    />

    <meta property="og:site_name" content="Developer Tech LLP" />

    <meta property="og:locale" content="en_IN" />

    <!-- Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />

    <meta
      name="twitter:title"
      content="Developer Tech LLP | Website Development Company"
    />

    <meta
      name="twitter:description"
      content="Professional website development and SEO services for businesses."
    />

    <meta
      name="twitter:image"
      content="https://developertech.in/og-image.jpg"
    />

    <!-- Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Schema Markup -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Developer Tech LLP",
        "url": "https://developertech.in",
        "logo": "https://developertech.in/logo.png",
        "description": "Website development, SEO, and software solutions company.",
        "sameAs": [
          "https://www.instagram.com/",
          "https://www.linkedin.com/",
          "https://www.facebook.com/"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer support",
          "areaServed": "IN",
          "availableLanguage": ["English", "Hindi"]
        }
      }
    </script>

    <!-- Local Business Schema -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "ProfessionalService",
        "name": "Developer Tech LLP",
        "image": "https://developertech.in/logo.png",
        "url": "https://developertech.in",
        "priceRange": "$$",
        "address": {
          "@type": "PostalAddress",
          "addressCountry": "India"
        },
        "areaServed": "India"
      }
    </script>
  </head>

  <body>
    <div id="root"></div>

    <script type="module" src="/client/main.tsx"></script>
  </body>
</html>

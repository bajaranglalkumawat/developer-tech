services:
  - type: web
    name: developer-tech
    env: node
    region: oregon
    plan: starter
    branch: main
    buildCommand: pnpm install && pnpm run build
    startCommand: node dist/server/node-build.mjs
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 8080
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 7d
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: SITE_URL
        sync: false
      - key: BREVO_API_KEY
        sync: false
      - key: BREVO_SENDER_EMAIL
        sync: false
      - key: BREVO_SENDER_NAME
        value: Developer Tech Support
      - key: GOOGLE_SHEETS_WEBHOOK_URL
        sync: false
      - key: PING_MESSAGE
        value: pong

services:
  - type: web
    name: fusion-starter
    env: node
    plan: starter
    region: oregon
    buildCommand: |
      corepack enable
      corepack prepare pnpm@10.14.0 --activate
      pnpm install --frozen-lockfile
      pnpm run build
    startCommand: pnpm start
    healthCheckPath: /health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: PING_MESSAGE
        value: "pong"
